name: Build Android APK

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Website to APK Action
        uses: darkshredder/web-to-app-action@Latest
        with:
          build-folder-path: dist
          app-name: Talkio
          output-folder-path: apk-build

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: Talkio-android
          path: apk-build/