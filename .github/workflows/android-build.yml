name: Build Android APK

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Install global Capacitor & Ionic
        run: npm install -g @ionic/cli @capacitor/cli

      - name: Build web app
        run: npm run build

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Add Android platform
        run: npx cap add android

      - name: Allow cleartext traffic in AndroidManifest.xml
        run: |
          sed -i '/<application / s|>| android:usesCleartextTraffic="true" android:networkSecurityConfig="@xml/network_security_config">|' android/app/src/main/AndroidManifest.xml

      - name: Add network_security_config.xml
        run: |
          mkdir -p android/app/src/main/res/xml
          cat <<EOF > android/app/src/main/res/xml/network_security_config.xml
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
            <base-config cleartextTrafficPermitted="true" />
          </network-security-config>
          EOF

      - name: Copy web assets
        run: npx cap copy android

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Talkio-android
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Upload APK to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}